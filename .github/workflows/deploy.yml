name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install server dependencies
      run: |
        cd server
        npm install

    - name: Install client dependencies
      run: |
        cd client
        npm install

    - name: Run server tests
      run: |
        cd server
        npm test

    - name: Build client
      run: |
        cd client
        npm run build

    - name: Deploy to AWS (placeholder)
      run: |
        echo "Add deployment steps here, e.g., upload to S3, deploy to EC2, etc."
        # Example: scp -r client/build user@your-ec2-instance:/path/to/serve
        # Or use AWS CLI to deploy